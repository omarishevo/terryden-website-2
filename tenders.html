<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tender Opportunities | Terryden Agencies</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { colors: { brandBlue:'#1B3B6F', brandNavy:'#0A2647', brandGold:'#D4AF37' }}}}</script>
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans">
<div id="navbar-slot"></div>
<section class="pt-32 pb-16 bg-brandNavy text-white text-center">
  <h1 class="text-4xl font-extrabold">Tender Opportunities</h1>
  <p class="text-brandGold mt-3">Current tenders, alerts, and downloadable documents</p>
</section>

<section class="section-pad max-w-6xl mx-auto px-6">
  <div class="bg-white p-10 rounded-xl shadow text-center mb-14">
    <p class="text-gray-500 text-lg">There are no open tenders at the moment.</p>
    <p class="text-gray-400 text-sm mt-2">Subscribe below and we'll email you as soon as a new tender is published.</p>
  </div>

  <h2 class="text-2xl font-bold text-brandNavy mb-6">Subscribe for Tender Alerts</h2>
  <form class="bg-white p-8 rounded-xl shadow flex flex-col sm:flex-row gap-4" onsubmit="event.preventDefault(); alert('Subscribed! (demo)');">
    <input required type="email" placeholder="Your email address" class="flex-1 border rounded-lg px-4 py-3">
    <button class="bg-brandGold text-brandNavy font-bold px-8 py-3 rounded-lg hover:bg-yellow-600 transition">Subscribe</button>
  </form>
</section>
<div id="footer-slot"></div>
<script src="components.js"></script>
</body>
</html>
